version: v2

plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative

  # Uses the locally installed @bufbuild/protoc-gen-es npm package (web/node_modules).
  # Run via: PATH="$PATH:$PWD/web/node_modules/.bin" buf generate --template buf.gen.yaml
  # from the repo root, or use `task generate:clients` inside the Nix devshell.
  # Service clients come from the generated *_pb.ts service descriptors,
  # so no separate connect plugin is needed for Connect v2.
  - local: protoc-gen-es
    out: web/src/lib/gen
    opt:
      - target=ts

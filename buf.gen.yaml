version: v2

plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative

  # Uses the locally installed @bufbuild/protoc-gen-es npm package (web/node_modules).
  # Run via: cd web && npx buf generate --config ../buf.gen.yaml
  # npx adds node_modules/.bin to PATH so protoc-gen-es is found automatically.
  # Service clients are created via serviceDesc() from @bufbuild/protobuf/codegenv2
  # (see web/src/lib/api/services.ts) — no separate connect plugin needed for v2.
  - local: protoc-gen-es
    out: web/src/lib/gen
    opt:
      - target=ts

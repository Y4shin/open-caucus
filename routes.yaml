version: 1.0

middleware_groups:
  - prefix: /docs
    middleware:
      - session
      - auth

routes:
  # Admin Login
  - path: /admin/login
    methods:
      - verb: GET
        handler: AdminLogin
        middleware:
          - session  # Check if already logged in
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminLoginTemplate
          input_type: AdminLoginInput

      - verb: POST
        handler: AdminLoginSubmit
        middleware:
          - session
          - password_auth_enabled
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminLoginTemplate
          input_type: AdminLoginInput

  # Admin Logout
  - path: /admin/logout
    methods:
      - verb: POST
        handler: AdminLogout
        middleware:
          - session
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminLoginTemplate
          input_type: AdminLoginInput

  # Admin Dashboard
  - path: /admin
    methods:
      - verb: GET
        handler: AdminDashboard
        middleware:
          - session
          - admin_required
        query_params:
          - page
          - page_size
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminDashboardTemplate
          input_type: AdminDashboardInput

  # Admin Accounts Page
  - path: /admin/accounts
    methods:
      - verb: GET
        handler: AdminAccounts
        middleware:
          - session
          - admin_required
        query_params:
          - page
          - page_size
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminAccountsTemplate
          input_type: AdminAccountsInput

  # Create Account
  - path: /admin/account/create
    methods:
      - verb: POST
        handler: AdminCreateAccount
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AccountListPartial
          input_type: AccountListPartialInput

  # Create Committee
  - path: /admin/committee/create
    methods:
      - verb: POST
        handler: AdminCreateCommittee
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: CommitteeListPartial
          input_type: CommitteeListPartialInput

  # Delete Committee
  - path: /admin/committee/{slug}/delete
    methods:
      - verb: POST
        handler: AdminDeleteCommittee
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: CommitteeListPartial
          input_type: CommitteeListPartialInput

  # Committee Accounts Page
  - path: /admin/committee/{slug}
    methods:
      - verb: GET
        handler: AdminCommitteeUsers
        middleware:
          - session
          - admin_required
        query_params:
          - page
          - page_size
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminCommitteeUsersTemplate
          input_type: AdminCommitteeUsersInput

  # Assign Account to Committee
  - path: /admin/committee/{slug}/account/assign
    methods:
      - verb: POST
        handler: AdminAssignAccount
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: UserListPartial
          input_type: UserListPartialInput

  # Create OAuth Committee Group Rule
  - path: /admin/committee/{slug}/oauth-group-rule/create
    methods:
      - verb: POST
        handler: AdminCreateOAuthCommitteeGroupRule
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: UserListPartial
          input_type: UserListPartialInput

  # Delete OAuth Committee Group Rule
  - path: /admin/committee/{slug}/oauth-group-rule/{rule_id}/delete
    methods:
      - verb: POST
        handler: AdminDeleteOAuthCommitteeGroupRule
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: UserListPartial
          input_type: UserListPartialInput


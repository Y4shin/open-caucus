  - path: /admin/committee/{slug}/membership/{user_id}/delete
    methods:
      - verb: POST
        handler: AdminDeleteUser
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: UserListPartial
          input_type: UserListPartialInput

  # Update Committee Membership
  - path: /admin/committee/{slug}/membership/{user_id}/update
    methods:
      - verb: POST
        handler: AdminUpdateUserMembership
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: UserListPartial
          input_type: UserListPartialInput

  # ===== User Authentication Routes =====

  # Home page (my committees)
  - path: /home
    methods:
      - verb: GET
        handler: Home
        middleware:
          - session
          - auth
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: HomeTemplate
          input_type: HomeInput

  # User Login Page
  - path: /
    methods:
      - verb: GET
        handler: LoginPage
        middleware:
          - session  # Check if already logged in
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: LoginPageTemplate
          input_type: LoginPageInput

  # User Login Submit
  - path: /login
    methods:
      - verb: POST
        handler: LoginSubmit
        middleware:
          - session
          - password_auth_enabled
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: LoginPageTemplate
          input_type: LoginPageInput

  # OAuth/OIDC Login Start
  - path: /oauth/start
    methods:
      - verb: GET
        handler: OAuthStart
        middleware:
          - session
        query_params:
          - target
        raw: true

  # OAuth/OIDC Callback
  - path: /oauth/callback
    methods:
      - verb: GET
        handler: OAuthCallback
        middleware:
          - session
        raw: true

  # Committee Dashboard
  - path: /committee/{slug}
    methods:
      - verb: GET
        handler: CommitteePage
        middleware:
          - session
          - auth
          - committee_access
        query_params:
          - page
          - page_size
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: CommitteePageTemplate
          input_type: CommitteePageInput


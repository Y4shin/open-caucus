          - meeting_access
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AttendeeSpeakersListPartial
          input_type: AttendeeSpeakersListPartialInput

  # Attendee Speaker Self Yield (end own current speech)
  - path: /committee/{slug}/meeting/{meeting_id}/speaker/self-yield
    methods:

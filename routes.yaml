  # Moderate SSE Stream
  - path: /committee/{slug}/meeting/{meeting_id}/moderate/stream
    methods:
      - verb: GET
        sse: true
        handler: ModerateStream
        middleware:
          - session
          - auth
          - committee_access
          - meeting_access
          - moderate_access
        query_params:
          - client_id
        events:
          - name: ModerateUpdated
            template:

version: 1.0

routes:
  # Admin Login
  - path: /admin/login
    methods:
      - verb: GET
        handler: AdminLogin
        middleware:
          - session  # Check if already logged in
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminLoginTemplate
          input_type: AdminLoginInput

      - verb: POST
        handler: AdminLoginSubmit
        middleware:
          - session
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminLoginTemplate
          input_type: AdminLoginInput

  # Admin Logout
  - path: /admin/logout
    methods:
      - verb: POST
        handler: AdminLogout
        middleware:
          - session
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminLoginTemplate
          input_type: AdminLoginInput

  # Admin Dashboard
  - path: /admin
    methods:
      - verb: GET
        handler: AdminDashboard
        middleware:
          - session
          - admin_required
        query_params:
          - page
          - page_size
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminDashboardTemplate
          input_type: AdminDashboardInput

  # Create Committee
  - path: /admin/committee/create
    methods:
      - verb: POST
        handler: AdminCreateCommittee
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: CommitteeListPartial
          input_type: CommitteeListPartialInput

  # Delete Committee
  - path: /admin/committee/{slug}/delete
    methods:
      - verb: POST
        handler: AdminDeleteCommittee
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: CommitteeListPartial
          input_type: CommitteeListPartialInput

  # Committee Users Page
  - path: /admin/committee/{slug}
    methods:
      - verb: GET
        handler: AdminCommitteeUsers
        middleware:
          - session
          - admin_required
        query_params:
          - page
          - page_size
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: AdminCommitteeUsersTemplate
          input_type: AdminCommitteeUsersInput

  # Create User
  - path: /admin/committee/{slug}/user/create
    methods:
      - verb: POST
        handler: AdminCreateUser
        middleware:
          - session
          - admin_required
        template:
          package: github.com/Y4shin/conference-tool/internal/templates
          type: UserListPartial
          input_type: UserListPartialInput

  # Delete User
  - path: /admin/committee/{slug}/user/{user_id}/delete
    methods:
      - verb: POST
        handler: AdminDeleteUser
        middleware:
          - session
          - admin_required
        template:

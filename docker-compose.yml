# This compose setup uses host networking so the existing local OIDC defaults
# (127.0.0.1:8080 and 127.0.0.1:9096) work for both browser and containers.
# Host networking is Linux-oriented; adjust networking/env if running on Docker Desktop.
services:
  setup:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    working_dir: /workspace
    volumes:
      - ./:/workspace
    entrypoint:
      - sh
      - -lc
    command:
      - conference-tool oidc-dev populate-env && conference-tool oidc-dev generate-users --force
    restart: "no"

  oidc:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["oidc-dev", "serve"]
    environment:
      OAUTH_ISSUER_URL: http://127.0.0.1:9096
      OIDC_DEV_LISTEN_ADDR: 0.0.0.0:9096
    depends_on:
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9096/.well-known/openid-configuration >/dev/null || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  mailpit:
    image: axllent/mailpit:latest
    network_mode: host
    environment:
      MP_SMTP_BIND_ADDR: "0.0.0.0:1025"
      MP_UI_BIND_ADDR: "0.0.0.0:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8025/ >/dev/null || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["serve"]
    environment:
      HOST: 0.0.0.0
      OAUTH_ISSUER_URL: http://127.0.0.1:9096
      OAUTH_REDIRECT_URL: http://127.0.0.1:8080/oauth/callback
      EMAIL_ENABLED: "true"
      EMAIL_SMTP_HOST: "127.0.0.1"
      EMAIL_SMTP_PORT: "1025"
      EMAIL_FROM_ADDRESS: "noreply@open-caucus.dev"
      EMAIL_FROM_NAME: "Open Caucus"
    depends_on:
      setup:
        condition: service_completed_successfully
      oidc:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/login >/dev/null || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 5s

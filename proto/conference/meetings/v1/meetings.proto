syntax = "proto3";

package conference.meetings.v1;

option go_package = "github.com/Y4shin/conference-tool/gen/go/conference/meetings/v1;meetingsv1";

import "conference/common/v1/common.proto";

service MeetingService {
  rpc GetJoinMeeting(GetJoinMeetingRequest) returns (GetJoinMeetingResponse);
  rpc GetLiveMeeting(GetLiveMeetingRequest) returns (GetLiveMeetingResponse);
  rpc GetMeetingJoinQr(GetMeetingJoinQrRequest) returns (GetMeetingJoinQrResponse);
  rpc SubscribeMeetingEvents(SubscribeMeetingEventsRequest) returns (stream MeetingEvent);
}

message JoinMeetingCapabilities {
  bool can_self_signup = 1;
  bool can_guest_join = 2;
  bool already_joined = 3;
  bool can_use_attendee_login = 4;
}

message JoinMeetingView {
  string committee_slug = 1;
  string meeting_id = 2;
  string meeting_name = 3;
  string committee_name = 4;
  bool signup_open = 5;
  conference.common.v1.AttendeeSummary current_attendee = 6;
  JoinMeetingCapabilities capabilities = 7;
}

message GetJoinMeetingRequest {
  string committee_slug = 1;
  string meeting_id = 2;
}

message GetJoinMeetingResponse {
  JoinMeetingView meeting = 1;
}

message LiveMeetingCapabilities {
  bool can_self_signup = 1;
  bool can_add_regular_speech = 2;
  bool can_add_point_of_order_speech = 3;
  bool can_vote = 4;
  bool can_view_current_document = 5;
}

message LiveMeetingView {
  string committee_slug = 1;
  string meeting_id = 2;
  string meeting_name = 3;
  string committee_name = 4;
  uint64 version = 5;
  conference.common.v1.AgendaPointSummary active_agenda_point = 6;
  repeated conference.common.v1.SpeakerSummary speakers = 7;
  conference.common.v1.CurrentDocumentSummary current_document = 8;
  LiveMeetingCapabilities capabilities = 9;
}

message GetLiveMeetingRequest {
  string committee_slug = 1;
  string meeting_id = 2;
}

message GetLiveMeetingResponse {
  LiveMeetingView meeting = 1;
}

message MeetingJoinQrView {
  string committee_slug = 1;
  string meeting_id = 2;
  string meeting_name = 3;
  string committee_name = 4;
  string join_url = 5;
  string qr_code_data_url = 6;
}

message GetMeetingJoinQrRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string base_url = 3;
}

message GetMeetingJoinQrResponse {
  MeetingJoinQrView view = 1;
}

// SubscribeMeetingEvents streams typed invalidation events for a meeting.
// Each message indicates which view(s) have changed; the client should
// refetch the relevant typed RPC for the indicated kind.
message SubscribeMeetingEventsRequest {
  string committee_slug = 1;
  string meeting_id = 2;
}

enum MeetingEventKind {
  MEETING_EVENT_KIND_UNSPECIFIED = 0;
  MEETING_EVENT_KIND_SPEAKERS_UPDATED = 1;
  MEETING_EVENT_KIND_VOTES_UPDATED = 2;
  MEETING_EVENT_KIND_AGENDA_UPDATED = 3;
  MEETING_EVENT_KIND_ATTENDEES_UPDATED = 4;
  MEETING_EVENT_KIND_MEETING_UPDATED = 5;
}

message MeetingEvent {
  MeetingEventKind kind = 1;
}

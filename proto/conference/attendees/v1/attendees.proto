syntax = "proto3";

package conference.attendees.v1;

option go_package = "github.com/Y4shin/open-caucus/gen/go/conference/attendees/v1;attendeesv1";

import "conference/common/v1/common.proto";

service AttendeeService {
  // ListAttendees returns the attendee roster for a meeting.
  rpc ListAttendees(ListAttendeesRequest) returns (ListAttendeesResponse);

  // SelfSignup registers the currently authenticated account-session user as an
  // attendee for the given meeting. Idempotent: succeeds if already signed up.
  rpc SelfSignup(SelfSignupRequest) returns (SelfSignupResponse);

  // GuestJoin creates a new guest attendee record and returns the attendee
  // access secret needed to log in. The caller must provide the meeting secret.
  rpc GuestJoin(GuestJoinRequest) returns (GuestJoinResponse);

  // AttendeeLogin exchanges the attendee access secret for a session cookie.
  // The response cookie must be stored by the client; subsequent API calls
  // will carry this cookie to authenticate as the attendee.
  rpc AttendeeLogin(AttendeeLoginRequest) returns (AttendeeLoginResponse);

  // CreateAttendee creates a guest attendee on behalf of a moderator/chairperson.
  // Unlike GuestJoin, this does not require signup to be open or a meeting secret.
  rpc CreateAttendee(CreateAttendeeRequest) returns (CreateAttendeeResponse);

  // DeleteAttendee removes an attendee from a meeting.
  // Requires chairperson access.
  rpc DeleteAttendee(DeleteAttendeeRequest) returns (DeleteAttendeeResponse);

  // SetChairperson updates the chairperson flag for an attendee.
  // Requires chairperson access.
  rpc SetChairperson(SetChairpersonRequest) returns (SetChairpersonResponse);

  // SetQuoted updates the gender-quotation flag for an attendee.
  // Requires chairperson access.
  rpc SetQuoted(SetQuotedRequest) returns (SetQuotedResponse);

  // GetAttendeeRecovery returns the direct attendee-login URL and QR code for a guest attendee.
  // Requires moderation access for the meeting.
  rpc GetAttendeeRecovery(GetAttendeeRecoveryRequest) returns (GetAttendeeRecoveryResponse);

  // InviteSecretJoin creates an attendee record for a committee member identified
  // by their invite_secret token and starts a guest session for them.
  rpc InviteSecretJoin(InviteSecretJoinRequest) returns (InviteSecretJoinResponse);
}

// AttendeeRecord is the canonical attendee read model for both moderator and
// attendee-facing views.
message AttendeeRecord {
  string attendee_id = 1;
  string full_name = 2;
  int64 attendee_number = 3;
  bool is_chair = 4;
  bool is_guest = 5;
  bool quoted = 6;
  // mine is true when the record belongs to the calling actor.
  bool mine = 7;
}

message ListAttendeesRequest {
  string committee_slug = 1;
  string meeting_id = 2;
}

message ListAttendeesResponse {
  repeated AttendeeRecord attendees = 1;
}

message SelfSignupRequest {
  string committee_slug = 1;
  string meeting_id = 2;
}

message SelfSignupResponse {
  AttendeeRecord attendee = 1;
  // already_existed is true when the attendee row already existed (idempotent).
  bool already_existed = 2;
}

message GuestJoinRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string full_name = 3;
  string meeting_secret = 4;
  bool gender_quoted = 5;
}

message GuestJoinResponse {
  AttendeeRecord attendee = 1;
  // attendee_secret is the per-attendee access code needed to log back in later.
  string attendee_secret = 2;
}

message AttendeeLoginRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  // attendee_secret is the per-attendee access code shown after GuestJoin.
  string attendee_secret = 3;
}

message AttendeeLoginResponse {
  AttendeeRecord attendee = 1;
  conference.common.v1.ActorSummary actor = 2;
}

message CreateAttendeeRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string full_name = 3;
  bool gender_quoted = 4;
}

message CreateAttendeeResponse {
  AttendeeRecord attendee = 1;
  // attendee_secret is the per-attendee access code for the created guest.
  string attendee_secret = 2;
}

message DeleteAttendeeRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string attendee_id = 3;
}

message DeleteAttendeeResponse {}

message SetChairpersonRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string attendee_id = 3;
  bool is_chair = 4;
}

message SetChairpersonResponse {
  AttendeeRecord attendee = 1;
}

message SetQuotedRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string attendee_id = 3;
  bool quoted = 4;
}

message SetQuotedResponse {
  AttendeeRecord attendee = 1;
}

message AttendeeRecoveryView {
  string committee_slug = 1;
  string meeting_id = 2;
  string attendee_id = 3;
  string meeting_name = 4;
  string committee_name = 5;
  string attendee_name = 6;
  string login_url = 7;
  string qr_code_data_url = 8;
}

message GetAttendeeRecoveryRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string attendee_id = 3;
  string base_url = 4;
}

message GetAttendeeRecoveryResponse {
  AttendeeRecoveryView view = 1;
}

message InviteSecretJoinRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string invite_secret = 3;
}

message InviteSecretJoinResponse {
  string attendee_secret = 1;
  string attendee_id = 2;
}

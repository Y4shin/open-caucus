syntax = "proto3";

package conference.moderation.v1;

option go_package = "github.com/Y4shin/open-caucus/gen/go/conference/moderation/v1;moderationv1";

import "conference/common/v1/common.proto";

service ModerationService {
  rpc GetModerationView(GetModerationViewRequest) returns (GetModerationViewResponse);
  rpc ToggleSignupOpen(ToggleSignupOpenRequest) returns (ToggleSignupOpenResponse);
  rpc SetMeetingQuotation(SetMeetingQuotationRequest) returns (SetMeetingQuotationResponse);
  rpc SetMeetingModerator(SetMeetingModeratorRequest) returns (SetMeetingModeratorResponse);
}

message ModerationMeetingSummary {
  string committee_slug = 1;
  string meeting_id = 2;
  string meeting_name = 3;
  string committee_name = 4;
}

message ModerationAttendeeSummaryBlock {
  bool signup_open = 1;
  int32 total_count = 2;
  int32 guest_count = 3;
  int32 chair_count = 4;
  bool show_self_signup = 5;
}

message ModerationSpeakerSummaryBlock {
  int32 total_count = 1;
  bool has_active_speaker = 2;
  int32 waiting_count = 3;
}

message ModerationMeetingSettingsBlock {
  reserved 1, 2;
  string moderator_attendee_id = 3;
  repeated conference.common.v1.QuotationType quotation_order = 4; // ordered list of enabled quotation types
}

message ModerationView {
  ModerationMeetingSummary meeting = 1;
  uint64 version = 2;
  ModerationAttendeeSummaryBlock attendees = 3;
  conference.common.v1.AgendaPointSummary active_agenda_point = 4;
  ModerationSpeakerSummaryBlock speakers = 5;
  repeated conference.common.v1.Capability capabilities = 6;
  ModerationMeetingSettingsBlock settings = 7;
}

message GetModerationViewRequest {
  string committee_slug = 1;
  string meeting_id = 2;
}

message GetModerationViewResponse {
  ModerationView view = 1;
}

message ToggleSignupOpenRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  bool desired_open = 3;
  uint64 expected_version = 4;
}

message ToggleSignupOpenResponse {
  string meeting_id = 1;
  bool signup_open = 2;
  uint64 version = 3;
  repeated string invalidated_views = 4;
}

message SetMeetingQuotationRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  reserved 3, 4;
  repeated conference.common.v1.QuotationType quotation_order = 5; // ordered list of enabled quotation types
}

message SetMeetingQuotationResponse {
  string meeting_id = 1;
  reserved 2, 3;
  uint64 version = 4;
  repeated string invalidated_views = 5;
  repeated conference.common.v1.QuotationType quotation_order = 6; // echoed back
}

message SetMeetingModeratorRequest {
  string committee_slug = 1;
  string meeting_id = 2;
  string moderator_attendee_id = 3;
}

message SetMeetingModeratorResponse {
  string meeting_id = 1;
  string moderator_attendee_id = 2;
  uint64 version = 3;
  repeated string invalidated_views = 4;
}

version: '3'

vars:
  BINARY_NAME: conference-tool
  BUILD_DIR: ./tmp
  MAIN_PATH: .
  ROUTES_CONFIG: routes.yaml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Development tasks
  dev:
    desc: Run the application with hot reload (using air)
    cmds:
      - go tool air

  run:
    desc: Run the application directly
    deps: [generate]
    cmds:
      - go run {{.MAIN_PATH}} serve

  env:populate:
    desc: Create/update a ready-to-use local .env for app + dev OIDC
    cmds:
      - go run {{.MAIN_PATH}} oidc-dev populate-env

  oidc-dev:run:
    desc: Run the local OAuth/OIDC development provider
    cmds:
      - go run {{.MAIN_PATH}} oidc-dev serve

  oidc-dev:generate-users:
    desc: Generate example local OIDC users YAML
    cmds:
      - go run {{.MAIN_PATH}} oidc-dev generate-users {{.CLI_ARGS}}

  run:with-oidc:
    desc: Populate local env, generate OIDC users config, then run OIDC provider and app together
    cmds:
      - task: env:populate
      - task: oidc-dev:generate-users
        vars:
          CLI_ARGS: --force
      - task --parallel oidc-dev:run run

  docker:up:
    desc: Start app + local OIDC in Docker Compose (includes setup bootstrap)
    cmds:
      - docker compose up --build app oidc

  docker:down:
    desc: Stop Docker Compose services and remove orphan containers
    cmds:
      - docker compose down --remove-orphans

  docker:up:desktop:
    desc: Start app + local OIDC with Docker Desktop-compatible compose
    cmds:
      - docker compose -f docker-compose.desktop.yml up --build app oidc

  docker:down:desktop:
    desc: Stop Docker Desktop-compatible compose services and remove orphan containers
    cmds:
      - docker compose -f docker-compose.desktop.yml down --remove-orphans

  build:
    desc: Build the application
    deps: [generate]
    cmds:
      - go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN_PATH}}

  clean:
    desc: Clean build artifacts and temporary files
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - go clean

  # Code generation tasks
  generate:
    desc: Generate all code (routes, templates, database client)
    cmds:
      - task: css:build
      - go generate ./...

  css:build:
    desc: Build Tailwind + DaisyUI stylesheet
    cmds:
      - npm run build:css

  css:watch:
    desc: Watch and rebuild Tailwind + DaisyUI stylesheet
    cmds:
      - npm run watch:css

  generate:routes:
    desc: Generate routing code from routes.yaml
    dir: internal/routes
    cmds:
      - go generate

  generate:templates:
    desc: Generate Go code from Templ templates
    dir: internal/templates
    cmds:
      - go generate

  generate:db:
    desc: Generate database client code using SQLC
    dir: internal/repository/sqlite
    cmds:
      - go generate

  # Testing tasks
  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -cover ./...
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  test:e2e:
    desc: Run browser-based end-to-end tests (requires Playwright browsers installed)
    cmds:
      - go test -v -tags=e2e -timeout=300s ./e2e/...

  test:e2e:headed:
    desc: Run browser-based end-to-end tests with visible browser windows
    env:
      PLAYWRIGHT_HEADED: "1"
    cmds:
      - go test -v -tags=e2e -timeout=300s ./e2e/...

  test:e2e:headed:slow:
    desc: Run headed E2E tests with slow-motion browser actions
    env:
      PLAYWRIGHT_HEADED: "1"
      PLAYWRIGHT_SLOW_MO_MS: "350"
    cmds:
      - go test -v -tags=e2e -timeout=300s ./e2e/...

  test:watch:
    desc: Run tests in watch mode
    cmds:
      - |
        while true; do
          go test ./...
          inotifywait -r -e modify,create,delete --include '\.go$' .
        done

  # Code quality tasks
  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  lint:fix:
    desc: Run linter with auto-fix
    cmds:
      - golangci-lint run --fix

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  fmt:check:
    desc: Check if Go code is formatted
    cmds:
      - test -z "$(gofmt -l .)"

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Run all code quality checks
    cmds:
      - task: fmt
      - task: vet
      - task: lint

  # Dependency management
  deps:
    desc: Download dependencies
    cmds:
      - go mod download
      - npm install

  deps:tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  deps:verify:
    desc: Verify dependencies
    cmds:
      - go mod verify

  deps:update:
    desc: Update all dependencies
    cmds:
      - go get -u ./...
      - go mod tidy

  # Database tasks
  db:migrate:up:
    desc: Run database migrations up
    cmds:
      - echo "Database migration commands not yet implemented in the binary"

  db:migrate:down:
    desc: Run database migrations down
    cmds:
      - echo "Database migration commands not yet implemented in the binary"

  db:migrate:create:
    desc: Create a new migration
    cmds:
      - echo "Database migration commands not yet implemented in the binary"

  db:reset:
    desc: Reset database (down and up)
    cmds:
      - echo "Database migration commands not yet implemented in the binary"

  # Validation tasks
  validate:routes:
    desc: Validate routes.yaml configuration
    cmds:
      - go run ./tools/routing/cmd/route-codegen/main.go -config {{.ROUTES_CONFIG}} -validate

  # Development workflow tasks
  fresh:
    desc: Fresh start - clean, generate, and run
    cmds:
      - task: clean
      - task: generate
      - task: build
      - task: run

  ci:
    desc: Run CI checks (format, vet, lint, test)
    cmds:
      - task: fmt:check
      - task: vet
      - task: lint
      - task: test

  playwright:install:
    desc: Install Playwright browser binaries (run once per machine)
    cmds:
      - go tool github.com/playwright-community/playwright-go/cmd/playwright install --with-deps chromium

  playwright:install-nix:
    desc: Install Playwright browser binaries (run once per machine)
    cmds:
      - go tool github.com/playwright-community/playwright-go/cmd/playwright install

  playwright:cli:
    desc: "Run the Playwright CLI with arbitrary arguments (usage: task playwright:cli -- <args>)"
    cmds:
      - go tool github.com/playwright-community/playwright-go/cmd/playwright {{.CLI_ARGS}}

  docs:capture:all:
    desc: Regenerate all internal documentation images and GIFs in self-hosted capture environments
    cmds:
      - go run {{.MAIN_PATH}} docs-capture run

  deps:check:
    desc: Check that required tools are installed (go, node, npm)
    cmds:
      - |
        failed=0
        if command -v go >/dev/null 2>&1; then
          printf "  OK    go:   %s\n" "$(go version)"
        else
          printf "  MISS  go    — install from https://go.dev/dl/ (need 1.25+)\n"
          failed=1
        fi
        if command -v node >/dev/null 2>&1; then
          printf "  OK    node: %s\n" "$(node --version)"
        else
          printf "  MISS  node  — install from https://nodejs.org/ (need 20+)\n"
          failed=1
        fi
        if command -v npm >/dev/null 2>&1; then
          printf "  OK    npm:  %s\n" "$(npm --version)"
        else
          printf "  MISS  npm   — bundled with node, reinstall from https://nodejs.org/\n"
          failed=1
        fi
        if [ "$failed" -ne 0 ]; then
          echo ""
          echo "One or more dependencies are missing. Install them and re-run 'task deps:check'."
          exit 1
        fi
        echo ""
        echo "All required dependencies are installed."

  init:dev-db:
    desc: Initialize the database with an admin user.
    vars:
      USERNAME: admin
      PASSWORD: admin
    cmds:
      - go run {{.MAIN_PATH}} create-admin --username {{.USERNAME}} --password {{.PASSWORD}}

  setup:
    desc: Initial project setup
    cmds:
      - task: deps:check
      - task: deps
      - task: generate
      - echo "Setup complete! Run 'task dev' to start development."

  # Frontend (SvelteKit) tasks
  dev:web:
    desc: Run the SvelteKit dev server with hot reload (proxies /api to Go backend on :8080)
    dir: web
    cmds:
      - npm run dev

  build:web:
    desc: Build the SvelteKit SPA (outputs to internal/web/build for Go embedding)
    dir: web
    cmds:
      - npm run build

  test:web:
    desc: Run SvelteKit unit and component tests
    dir: web
    cmds:
      - npm run test

  check:web:
    desc: Run svelte-check and TypeScript type checks for the frontend
    dir: web
    cmds:
      - npm run check

  lint:web:
    desc: Lint and format-check the frontend code
    dir: web
    cmds:
      - npm run lint

  format:web:
    desc: Format the frontend code with Prettier
    dir: web
    cmds:
      - npm run format

  generate:clients:
    desc: Regenerate TypeScript and Go clients from proto definitions (requires buf)
    cmds:
      - buf generate

  dev:full:
    desc: Run Go backend and SvelteKit dev server in parallel (full dev environment)
    cmds:
      - task --parallel dev dev:web
